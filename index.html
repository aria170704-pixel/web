<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>On마음코칭센터</title>
    <link rel="stylesheet" href="/CSS/style.css">
    <script src="/JS/jquery-1.12.3.js"></script>
    <script src="/JS/script.js" defer></script>
</head>
<body>

<!-- 인트로 레이어 -->
<div id="intro">
    <div class="intro-content">
        <div class="light-switch" id="lightSwitch">
            <div class="wire"></div>
            <div class="handle"></div>
        </div>
        <div class="intro-logo-wrapper">
            <!-- 조명 꺼져있을 때 이미지 (예: 회색 또는 어두운 로고) -->
            <img src="/img/logo.PNG" alt="Logo Off" class="logo-img off">
        </div>
        <h1 class="intro-logo">On마음코칭센터</h1>
        <p>CONSULTING · SEMINAR · CREATING</p>
    </div>
</div>

<!-- 상단 네비게이션 -->
<nav class="navbar" id="navbar">
    <div class="logo">
        <a href="#intro">
            <!-- 조명이 켜진 후의 컬러 로고 혹은 기본 로고 이미지 -->
            <img src="/img/logo2.PNG" alt="Company Logo" class="nav-logo-img">
        </a>
    </div>
    <ul class="nav-menu">
        <!-- 드롭다운 메뉴 시작 -->
        <li class="dropdown">
            <a href="#none" class="dropbtn">ABOUT</a>
            <ul class="dropdown-content">
                <li><a href="#consulting">컨설팅</a></li>
                <li><a href="#seminar">세미나</a></li>
                <li><a href="#creating">크리에이팅</a></li>
            </ul>
        </li>
        <!-- 드롭다운 메뉴 끝 -->
    </ul>
</nav>

<!-- 스크롤 컨테이너 -->
<div class="scroll-container">
    <section class="panel consulting" id="consulting" data-theme="light">
        <div class="content">
            <span class="num">01</span>
            <h2>CONSULTING</h2>
            <p>전략적인 비즈니스 솔루션을 제안합니다.</p>
        </div>
    </section>

    <section class="panel seminar" id="seminar" data-theme="light">
        <div class="content">
            <span class="num">02</span>
            <h2>SEMINAR</h2>
            <p>지식 공유를 통해 함께 성장합니다.</p>
        </div>
    </section>

    <section class="panel creating" id="creating" data-theme="light">
        <div class="content">
            <span class="num">03</span>
            <h2>CREATING</h2>
            <p>감각적인 결과물을 만들어냅니다.</p>
        </div>
    </section>

    <!-- 푸터 섹션 -->
    <footer class="panel footer-section" id="contact" data-theme="dark">
        <div class="footer-inner">
            <div class="footer-info">
                <p>Email: contact@company.com</p>
                <p>Business No: 000-00-00000</p>
                <p>© 2026 Company Name.</p>
            </div>
        </div>
    </footer>
</div>

</body>
</html>
